$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, R, exec, pkill fuzzel || $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, exec, $browser

bind = $mainMod, C, exec, hyprshot -m region --freeze --clipboard-only
bind = $mainMod, X, exec, hyprpicker -a
bind = $mainMod, Z, exec, /usr/local/bin/h-record
# ^^^ wf-recorder needed

bind = CTRL, Q, killactive,
bind = $mainMod, A, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, S, layoutmsg, swapwithmaster
# bind = $mainMod, G, exec, killall -SIGUSR2 waybar
# ^^^ restart waybar

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4

# resize/move window with RMB/LMB
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# press shift + backspace to delete a whole line (system-wide)
bind = SHIFT, BACKSPACE, exec, wtype -k End && wtype -M shift -k Home && wtype -m shift -k Delete

# Cycle focus
bind = $mainMod, D, cyclenext,
bind = $mainMod, D, bringactivetotop,

# keyboard layouts
# bind = $mainMod, Z, exec, hyprctl switchxkblayout all 0
# bind = $mainMod, X, exec, hyprctl switchxkblayout all 1
# bind = $mainMod, C, exec, hyprctl switchxkblayout all 2

# Toggle between G435/Major V
bind = $mainMod, V, exec, /usr/local/bin/audio-switch-device.sh

binde = , XF86AudioRaiseVolume, exec, /usr/local/bin/volume.sh 1%+
binde = , XF86AudioLowerVolume, exec, /usr/local/bin/volume.sh 1%-
bind  = , XF86AudioMute,        exec, /usr/local/bin/volume.sh toggle
# ^^^ note: i use a knob on my keyboard and pressing it sends XF86AudioMute, and i just prefer it stop media instead of muting

# requires playerctl
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
